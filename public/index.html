<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unity Icon Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="divBy">
  <p class="byJoao">
    by <a target="_blank" class="linkJoao" href="https://www.joaodellarmelina.com/quem-sou">
      João Dellarmelina
    </a>
  </p>

  <select id="languageSelect" class="lang-select">
    <option value="pt-BR">🇧🇷 PT</option>
    <option value="en">🇺🇸 EN</option>
    <option value="es">🇪🇸 ES</option>
  </select>
</div>

<div class="page">
  <div class="card">

    <h1 id="title">unity icon generator.</h1>

    <p id="subtitle" class="subtitle">
      Envie uma imagem quadrada com no mínimo 1024x1024 para gerar apenas os ícones que você precisa.
    </p>

    <form id="uploadForm" class="upload-form">

      <label id="dropZone" class="drop-zone" for="fileInput">
        <input id="fileInput" type="file" name="icon" accept="image/png,image/jpeg,image/webp" hidden required />

        <div class="drop-content">
          <div class="upload-icon">+</div>

          <h2 id="dropTitle">Arraste sua imagem aqui</h2>
          <p id="dropText">ou clique para selecionar</p>

          <span id="fileHint" class="file-hint">
            PNG, JPG ou WEBP • mínimo 1024x1024
          </span>
        </div>
      </label>

      <div class="selectors-box">

        <div class="selectors-header">
          <h3 id="selectImagesTitle">Selecione quais imagens gerar</h3>

          <label class="inline-check">
            <input type="checkbox" id="selectAllTargets" />
            <span id="selectAllLabel">Selecionar tudo</span>
          </label>
        </div>

        <div class="checkbox-grid">

          <label class="check-card">
            <input type="checkbox" name="targets" value="ios" checked />
            <span id="iosLabel">iOS</span>
          </label>

          <label class="check-card">
            <input type="checkbox" name="targets" value="android" checked />
            <span id="androidLabel">Android</span>
          </label>

          <label class="check-card">
            <input type="checkbox" name="targets" value="windows" checked />
            <span id="windowsLabel">Windows</span>
          </label>

        </div>

        <div id="androidOptions" class="sub-options">

          <h4 id="androidVariantsTitle">Variantes do Android</h4>

          <div class="checkbox-grid small">

            <label class="check-card">
              <input type="checkbox" name="androidVariants" value="api26" checked />
              <span id="api26Label">API 26</span>
            </label>

            <label class="check-card">
              <input type="checkbox" name="androidVariants" value="api25" checked />
              <span id="api25Label">API 25 & Legacy</span>
            </label>

          </div>

        </div>
      </div>

      <div id="previewContainer" class="preview-container hidden">

        <h3 id="previewTitle">Pré-visualização</h3>

        <div class="preview-box">
          <img id="previewImage" />
        </div>

        <div class="file-meta" id="fileMeta"></div>

      </div>

      <div id="progressSection" class="progress-section hidden">

        <div class="progress-header">
          <span id="processingText">Processando imagem...</span>
          <span id="progressText">0%</span>
        </div>

        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>

      </div>

      <div id="statusMessage" class="status-message"></div>

      <div class="actions">

        <button type="submit" id="generateButton" class="primary-btn">
          Gerar ícones
        </button>

        <button type="button" id="resetButton" class="secondary-btn">
          Limpar
        </button>

      </div>

    </form>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
